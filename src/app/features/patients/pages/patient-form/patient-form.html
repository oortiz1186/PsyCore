<h1>Nuevo paciente</h1>

<form class="form" (ngSubmit)="save()">
  <mat-form-field appearance="outline">
    <mat-label>Nombre</mat-label>
    <input matInput name="first_name" [(ngModel)]="patient.first_name" required />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Apellidos</mat-label>
    <input matInput name="last_name" [(ngModel)]="patient.last_name" required />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Fecha de nacimiento</mat-label>
    <input matInput type="date" name="birth_date" [(ngModel)]="patient.birth_date" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Sexo</mat-label>
    <input matInput name="gender" [(ngModel)]="patient.gender" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Teléfono</mat-label>
    <input matInput name="phone" [(ngModel)]="patient.phone" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Correo</mat-label>
    <input matInput type="email" name="email" [(ngModel)]="patient.email" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Dirección</mat-label>
    <textarea matInput name="address" [(ngModel)]="patient.address"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Contacto de emergencia</mat-label>
    <input matInput name="emergency_contact" [(ngModel)]="patient.emergency_contact" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Teléfono de emergencia</mat-label>
    <input matInput name="emergency_phone" [(ngModel)]="patient.emergency_phone" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Motivo de consulta</mat-label>
    <textarea matInput name="consultation_reason" [(ngModel)]="patient.consultation_reason"></textarea>
  </mat-form-field>

  <mat-checkbox name="active" [(ngModel)]="patient.active">
    Paciente activo
  </mat-checkbox>

  <button mat-raised-button color="primary" type="submit">
    Guardar paciente
  </button>
</form>
