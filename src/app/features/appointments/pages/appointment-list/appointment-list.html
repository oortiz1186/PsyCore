<h1>Citas</h1>

<a mat-raised-button color="primary" routerLink="/appointments/new">
  Nueva cita
</a>

<table mat-table [dataSource]="appointments" class="mat-elevation-z8">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let appointment">
      {{ appointment.id }}
    </td>
  </ng-container>

  <ng-container matColumnDef="patient">
    <th mat-header-cell *matHeaderCellDef>Paciente</th>
    <td mat-cell *matCellDef="let appointment">
      {{ appointment.patients?.first_name }} {{ appointment.patients?.last_name }}
    </td>
  </ng-container>

  <ng-container matColumnDef="appointment_date">
    <th mat-header-cell *matHeaderCellDef>Fecha</th>
    <td mat-cell *matCellDef="let appointment">
      {{ appointment.appointment_date | date:'short' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Estado</th>
    <td mat-cell *matCellDef="let appointment">
      {{ appointment.status }}
    </td>
  </ng-container>

  <ng-container matColumnDef="notes">
    <th mat-header-cell *matHeaderCellDef>Notas</th>
    <td mat-cell *matCellDef="let appointment">
      {{ appointment.notes }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
